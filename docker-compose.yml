services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventflow_backend
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MYSQL_HOST: 172.17.0.1
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    networks:
      - eventflow_net
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventflow_frontend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - eventflow_net
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: eventflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - eventflow_net

volumes:
  media_files:

networks:
  eventflow_net:
    driver: bridge