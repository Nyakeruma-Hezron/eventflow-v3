services:
  db:
    image: mysql:8.0
    container_name: eventflow_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --bind-address=0.0.0.0
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eventflow_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventflow_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    volumes:
      # For a true immutable production deployment, prefer building code
      # and static assets into the image and remove the bind mount below.
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eventflow_net
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 4
        --timeout 120
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventflow_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # In production, build static assets and serve them with nginx.
      # Keep this mount only if your Dockerfile already produces a production build.
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    depends_on:
      - backend
    networks:
      - eventflow_net
    command: >
      sh -c "
        npm ci &&
        npm run preview -- --host 0.0.0.0 --port 5173
      "

  nginx:
    image: nginx:alpine
    container_name: eventflow_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8080:80"
      # Uncomment when TLS is configured
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/media:ro
      - static_files:/static:ro
      # Uncomment when using Let's Encrypt certificates
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
    networks:
      - eventflow_net

volumes:
  mysql_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local

networks:
  eventflow_net:
    driver: bridge