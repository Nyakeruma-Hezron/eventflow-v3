services:
  db:
    image: mysql:8.0
    container_name: eventflow_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eventflow_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventflow_backend
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    volumes:
      # Removed ./backend:/app so it uses the baked-in code from the build
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eventflow_net
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000 
      " 
      # Note: For strict production, consider replacing 'runserver' with Gunicorn:
      # gunicorn core.wsgi:application --bind 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventflow_frontend
    restart: unless-stopped
    env_file: .env
    # Removed ./frontend:/app and node_modules mappings
    depends_on:
      - backend
    networks:
      - eventflow_net
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: eventflow_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/media:ro
      - static_files:/static:ro
    depends_on:
      - backend
      - frontend
    networks:
      - eventflow_net

volumes:
  mysql_data:
  media_files:
  static_files:

networks:
  eventflow_net:
    driver: bridge