global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'django_backend'
    metrics_path: '/metrics'
    static_configs:
      # 'backend' is the name of your Django service in docker-compose.
      # 8000 is the internal port Django runs on.
      - targets: ['backend:8000']