name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export REPO_URL="git@github.com:${{ github.repository }}.git"
            export BRANCH_NAME="${{ github.ref_name }}"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: DEPLOY_PATH secret is not set."
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -d ".git" ]; then
              echo "Cloning repository to deployment path..."
              git clone -b "$BRANCH_NAME" "$REPO_URL" .
            else
              echo "Updating repository on VPS..."
              git fetch origin "$BRANCH_NAME"
              git reset --hard "origin/$BRANCH_NAME"
              # Remove any untracked files to ensure a clean build environment
              git clean -fd
            fi

            echo "Building and deploying Docker images..."
            # Pull any updated base images (like mysql or nginx:alpine)
            docker compose pull || true
            
            # Build new images based on the pulled code and recreate containers
            docker compose up -d --build --remove-orphans

            echo "Deployment complete."